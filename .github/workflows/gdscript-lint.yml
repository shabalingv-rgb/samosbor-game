name: GDScript Lint

# Проверка синтаксиса/стиля GDScript (Sprint 0, задача 1.3).
# Использует gdtoolkit (gdlint) — работает на стандартном GitHub-раннере без Godot.

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gdtoolkit
        run: pip install "gdtoolkit==4.*"

      - name: Lint GDScript
        run: gdlint godot/scripts
